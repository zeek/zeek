      #     << : *FILTER_IF_PR_NOT_FULL_CI

      - windows-build:
          << : *FILTER_IF_SKIP_ALL

      - release-image-build:
          name: amd64-container-image
          arch: amd64
          resource_class: medium
          cpu_count: 4
          << : *FILTER_IF_PR_NOT_FULL_OR_CLUSTER_TEST
      - release-image-build:
          name: arm64-container-image
          arch: arm64
          resource_class: arm.medium
          cpu_count: 4
          << : *FILTER_NIGHTLY_OR_TAGGED
      - container-image-manifest-build:
          requires: [amd64-container-image, arm64-container-image]
          context:
            - zeek
          << : *FILTER_NIGHTLY_OR_TAGGED
      - public-ecr-cleanup:
          requires: [container-image-manifest-build]
          context:
            - zeek
          << : *FILTER_NIGHTLY_OR_TAGGED

      - zeekctl-testing:
          docker_image: zeek/zeek-ci:debian-12
          ci_image_date: "20260708"
          requires: [build-image-debian-12]
          << : *FILTER_IF_PR_NOT_FULL_OR_ZEEKCTL

      - include-plugins-testing:
          docker_image: zeek/zeek-ci:debian-13
          requires: [build-image-debian-13]
          << : *FILTER_IF_PR_NOT_FULL_CI

  weekly_compiler_builds:
    when: pipeline.schedule.name == "weekly"
    jobs:
      - fetch-test-traces
      - create-build-image:
          name: build-image-debian-unstable

      - linux-build:
          name: latest-gcc-version
          docker_image: zeek/zeek-ci:debian-unstable
          install_latest_compiler: true
          requires: [fetch-test-traces, build-image-debian-unstable]
          extra_env: |
            ZEEK_CI_COMPILER=gcc

      - linux-build:
          name: latest-clang-version
          docker_image: zeek/zeek-ci:debian-unstable
          install_latest_compiler: true
          requires: [fetch-test-traces, build-image-debian-unstable]
          extra_env: |
            ZEEK_CI_COMPILER=clang
