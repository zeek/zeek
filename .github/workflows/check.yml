name: Check

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - release/**
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  GIT_CONFIG_PARAMETERS: "'safe.directory=*'"

  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: "1G"
  CCACHE_BASEDIR: "${{ github.workspace }}"
  CCACHE_COMPRESS: "1"
  HILTI_CXX_COMPILER_LAUNCHER: "ccache"

  ZEEK_CI_WORKING_DIR: "${{ github.workspace }}"
  ZEEK_CI_CONFIGURE_FLAGS: '--build-type=release --disable-broker-tests --prefix=$ZEEK_CI_WORKING_DIR/install --ccache --enable-werror -D FETCHCONTENT_FULLY_DISCONNECTED:BOOL=ON'

  ZEEK_CI_BTEST_RETRIES: 2
  ZEEK_CI_SKIP_EXTERNAL_BTESTS: 1  # TODO: enable this eventually

  # Prevent Docker build steps from posting to the summary.
  DOCKER_BUILD_SUMMARY: false

jobs:

  # A job which only succeeds if we are running in a public repository.
  #
  # We use this below to skip all actual CI jobs in private repositories since
  # our CI matrix is huge and would quickly burn through the free credits
  # available for private repositories. To implement this jobs depend on this
  # one, but this one only ever runs for public repositories.
  is-public-repo:
    name: Require public repository
    runs-on: ubuntu-latest
    if: github.event.repository.private == false
    outputs:
      is_public_repo: ${{ true }}
    steps:
      - run: |
          : # Need to add at least one step

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # 6.3.0
        with:
          python-version: '3.14'
      - id: set-matrix
        run: |
          MATRIX=$(python .github/scripts/generate-gh-check-matrix.py)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  linux:
    needs: [is-public-repo, generate-matrix]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    name: ${{ matrix.id }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      # This step enables caching in `docker/build-push-action` below.
      - name: Prepare Docker
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          file: ${{ matrix.file }}
          context: .  # Reuse the current checkout instead of doing a full recursive clone again.
          tags: zeek-ci-${{ hashFiles(matrix.file) }}
          cache-to: type=gha
          cache-from: type=gha
          load: true
          push: false

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ github.workflow }}-${{ github.job }}-${{ matrix.id }}

      # TODO: add ./ci/init-external-repos.sh with caching, maybe in actual job below
      # - name: Clone external test suites
      #   run: |
      #     make -C testing/external/ init
      #     ./ci/init-external-repos.sh

      # TODO
      # - name: Clone private test suite
      #   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2

      - name: Run CI
        env:
          # We convert the environment variable dictionaries to JSON to work
          # around potential issues with shell quoting.
          _GHA_ENV: ${{ toJSON(env) }}
          _MATRIX_ENV: ${{ toJSON(matrix.env) }}
        run: |
          # Assemble environment variables for the script. We support both global
          # as well as job variables with the latter taking precedence. We also
          # allow either of them to be empty.
          python3 -c '
          import os, json

          gha = json.loads(os.environ.get("_GHA_ENV") or "{}") or {}
          mat = json.loads(os.environ.get("_MATRIX_ENV") or "{}") or {}
          merged = {**gha, **mat}
          with open("container.env", "w") as f:
              for k, v in merged.items():
                  # Handle multiline flattening
                  val = " ".join(str(v).splitlines())
                  f.write(f"{k}={val}\n")
          '

          docker run --rm \
              --env-file container.env \
              -v "${{ github.workspace }}":"${{ github.workspace }}" \
              -v "${CCACHE_DIR}":"${CCACHE_DIR}" \
              -w "${{ github.workspace }}" \
              zeek-ci-${{ hashFiles(matrix.file) }} \
              bash -c "set -e; ${{ matrix.run }}"

  windows:
    runs-on: windows-2025
    needs: is-public-repo

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
        with:
          sdk: "10.0.26100.0"

      - name: Install dependencies
        run: |
          choco install -y --no-progress winflexbison3 ccache sed
          choco install -y --no-progress openssl --version=3.1.1

      - name: Cache vcpkg dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          key: vcpkg-binary-cache-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          path: ~/AppData/Local/vcpkg/archives

      - name: Set up environment
        run: |
          echo "C:\Program Files\Git\usr\bin" >> $env:GITHUB_PATH
          mkdir build -Force

          # vcpkg binary package cache.
          $VCPKG_CACHE_DIR = "$env:LOCALAPPDATA\vcpkg\archives"
          if (!(Test-Path $VCPKG_CACHE_DIR)) {
            New-Item -ItemType Directory -Force -Path $VCPKG_CACHE_DIR
          }
          echo "VCPKG_BINARY_SOURCES=clear;files,$VCPKG_CACHE_DIR,readwrite" >> $env:GITHUB_ENV

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ github.workflow }}-${{ github.job }}

      - name: Prepare
        run: |
          ./ci/windows/prepare.cmd

      - name: Configure
        run: |
          ./ci/windows/configure.cmd

      - name: Build
        run: |
          ./ci/windows/build.cmd

      - name: Test
        run: |
          ./ci/windows/test.cmd

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: macos-15
          - release: macos-26

    runs-on: ${{ matrix.release }}
    needs: is-public-repo

    name: ${{ matrix.release }}

    env:
      ZEEK_CI_RUNNER_OS: macos
      ZEEK_CI_CONFIGURE_FLAGS: --build-type=release --disable-broker-tests --prefix=$ZEEK_CI_WORKING_DIR/install --ccache --enable-werror --with-krb5=/opt/homebrew/opt/krb5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # 6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ github.workflow }}-${{ github.job }}-${{ matrix.release }}

      - name: Prepare
        run: |
          ./ci/macos/prepare.sh

      - name: Pre-build
        run: |
          ./ci/pre-build.sh

      - name: Build
        run: |
          ./ci/build.sh

      - name: Test
        run: |
          ./ci/test.sh
