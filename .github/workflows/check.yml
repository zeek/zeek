name: Check

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

env:
  GIT_CONFIG_PARAMETERS: "'safe.directory=*'"

  GITHUB_WORKSPACE: "${{ github.workspace }}"

  CCACHE_DIR: ${{ github.workspace }}/ccache
  CCACHE_MAXSIZE: "1G"
  CCACHE_BASEDIR: "${{ github.workspace }}"
  CCACHE_COMPRESS: "1"
  HILTI_CXX_COMPILER_LAUNCHER: "ccache"

  ZEEK_CI_BTEST_RETRIES: 2
  ZEEK_CI_SKIP_EXTERNAL_BTESTS: 1 # FIXME: enable this eventually

  # FIXME(bbannier): Migrate scripts which use this legacy variable.
  CIRRUS_WORKING_DIR: ${{ github.workspace }}

jobs:
  linux:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
        - id: fedora-43
          file: ci/fedora-43/Dockerfile
          env:
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --prefix=$GITHUB_WORKSPACE/install --ccache -D FETCHCONTENT_FULLY_DISCONNECTED:BOOL=ON'
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: fedora-42
          file: ci/fedora-43/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: centosstream9
          file: ci/centos-stream-9/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: centosstream10
          file: ci/centos-stream-10/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: debian13
          file: ci/debian-13/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        # FIXME(bbannier): Somehow enable arm runner, maybe need to move to a separate setup
        # - id: debian13
        #   file: ci/debian-13/Dockerfile
        #   run: |
        #     ./ci/pre-build.sh
        #     ./ci/build.sh
        #     ./ci/test.sh

        - id: debian13-static
          file: ci/debian-13/Dockerfile
          env:
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=release --disable-broker-tests --enable-static-broker --enable-static-binpac --prefix=$CIRRUS_WORKING_DIR/install --ccache --enable-werror'
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: debian13-binary
          file: ci/debian-13/Dockerfile
          env:
            ZEEK_CI_CONFIGURE_FLAGS: '--prefix=$CIRRUS_WORKING_DIR/install --libdir=$CIRRUS_WORKING_DIR/install/lib --binary-package --enable-static-broker --enable-static-binpac --disable-broker-tests --build-type=Release --ccache --enable-werror'
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: debian14
          file: ci/debian-12/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: opensuse-leap-16.0
          file: ci/opensuse-leap-16.0/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: opensuse-tumbleweed
          file: ci/opensuse-tumbleweed/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: weekly-current-gcc
          file: ci/debian-unstable/Dockerfile
          env:
            ZEEK_CI_COMPILER: gcc
          run: |
            ./ci/debian-unstable/prepare-weekly.sh
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: weekly-current-clang
          file: ci/debian-unstable/Dockerfile
          env:
            ZEEK_CI_COMPILER: clang
          run: |
            ./ci/debian-unstable/prepare-weekly.sh
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: ubuntu-26.04
          file: ci/ubuntu-26.04/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: ubuntu-24.04
          file: ci/ubuntu-24.04/Dockerfile
          env:
            ZEEK_CI_CREATE_ARTIFACT: 1
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh
            ./ci/benchmark.sh

        - id: ubuntu-24.04-zam
          file: ci/ubuntu-24.04/Dockerfile
          env:
            ZEEK_CI_SKIP_UNIT_TESTS: 1
            ZEEK_CI_SKIP_EXTERNAL_BTESTS: 1
            ZEEK_CI_BTEST_EXTRA_ARGS: -a zam
            # Use a lower number of jobs due to OOM issues with ZAM tasks
            ZEEK_CI_BTEST_JOBS: 3
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: ubuntu-24.04-clang-libcpp
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CC: clang-19
            CXX: clang++-19
            CXXFLAGS: -stdlib=libc++
            # The libnode package is linked with the system's libstdc++, making
            # it incompatible with Zeek compiled using libc++.
            ZEEK_CI_CONFIGURE_FLAGS_EXTRA: --disable-javascript
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: ubuntu-24.04-clang-tidy
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CC: clang-19
            CXX: clang++-19
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --prefix=$CIRRUS_WORKING_DIR/install --ccache --enable-werror --enable-clang-tidy'
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            # Tests disabled for clang-tidy builds

        - id: ubuntu-24.04-spicy
          file: ci/ubuntu-24.04/Dockerfile
          env:
            ZEEK_CI_CREATE_ARTIFACT: 1
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=release --disable-broker-tests --enable-spicy-ssl --prefix=$CIRRUS_WORKING_DIR/install --ccache --enable-werror'
          run: |
            (
            cd auxil/spicy;
            git fetch;
            git reset --hard origin/main;
            git submodule update --init --recursive;
            )

            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh
            ./ci/spicy-install-analyzers.sh

        - id: ubuntu-24.04-spicy-head
          file: ci/ubuntu-24.04/Dockerfile
          env:
            ZEEK_CI_CREATE_ARTIFACT: 1
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=release --disable-broker-tests --enable-spicy-ssl --prefix=$CIRRUS_WORKING_DIR/install --ccache --enable-werror'
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh
            ./ci/benchmark.sh

        - id: ubuntu-22.04
          file: ci/ubuntu-22.04/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: alpine
          file: ci/alpine/Dockerfile
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

          # FIXME(bbannier): add missing tasks:
          #   - macos-tahoe
          #   - macos-sequoia
          #   - freebsd-15
          #   - freebsd-14
          #   - windows
          #   - container image building from

        - id: asan-sanitizer
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CXXFLAGS: -DZEEK_DICT_DEBUG
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --sanitizers=address --enable-fuzzers --enable-coverage --ccache --enable-werror'
            ASAN_OPTIONS: detect_leaks=1:detect_odr_violation=0
            # Use absolute paths for coverage files.
            CCACHE_BASEDIR: /
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

            ./ci/test-fuzzers.sh
            ./ci/upload-coverage.sh

        - id: asan-sanitizer-zam
          file: ci/ubuntu-24.04/Dockerfile
          env:
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --sanitizers=address --enable-fuzzers --enable-coverage --ccache --enable-werror'
            ASAN_OPTIONS: detect_leaks=1:detect_odr_violation=0
            ZEEK_CI_SKIP_UNIT_TESTS: 1
            ZEEK_CI_SKIP_EXTERNAL_BTESTS: 1
            ZEEK_CI_BTEST_EXTRA_ARGS: -a zam
            # Use a lower number of jobs due to OOM issues with ZAM tasks
            ZEEK_CI_BTEST_JOBS: 3
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: ubsan-sanitizer
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CC: clang-19
            CXX: clang++-19
            CXXFLAGS: -DZEEK_DICT_DEBUG
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --sanitizers=undefined --enable-fuzzers --ccache --enable-werror'
            ZEEK_CI_CONFIGURE_FLAGS_EXTRA: --disable-javascript
            ZEEK_TAILORED_UB_CHECKS: 1
            UBSAN_OPTIONS: print_stacktrace=1
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh
            ./ci/test-fuzzers.sh

        - id: ubsan-sanitizer-zam
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CC: clang-19
            CXX: clang++-19
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --sanitizers=undefined --enable-fuzzers --ccache --enable-werror'
            ZEEK_CI_CONFIGURE_FLAGS_EXTRA: --disable-javascript
            ZEEK_TAILORED_UB_CHECKS: 1
            UBSAN_OPTIONS: print_stacktrace=1
            ZEEK_CI_SKIP_UNIT_TESTS: 1
            ZEEK_CI_SKIP_EXTERNAL_BTESTS: 1
            ZEEK_CI_BTEST_EXTRA_ARGS: -a zam
            # Use a lower number of jobs due to OOM issues with ZAM tasks
            ZEEK_CI_BTEST_JOBS: 3
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: tsan-sanitizer
          file: ci/ubuntu-24.04/Dockerfile
          env:
            CC: clang-19
            CXX: clang++-19
            ZEEK_CI_CONFIGURE_FLAGS: '--build-type=debug --disable-broker-tests --sanitizers=thread --enable-fuzzers --ccache --enable-werror'
            ZEEK_CI_CONFIGURE_FLAGS_EXTRA: --disable-javascript
            ZEEK_CI_DISABLE_SCRIPT_PROFILING: 1
            # If this is defined directly in the environment, configure fails to find
            # OpenSSL. Instead we define it with a different name and then give it
            # the correct name in the testing scripts.
            ZEEK_TSAN_OPTIONS: suppressions=/home/runner/work/zeek/zeek/ci/tsan_suppressions.txt
          run: |
            ./ci/pre-build.sh
            ./ci/build.sh
            ./ci/test.sh

        - id: zeekctl-debian13
          file: ci/debian-13/Dockerfile
          run: |
            apt-get update
            apt-get install -y --no-install-recommends iproute2

            cd auxil/zeekctl/testing
            ./Scripts/build-zeek
            ../../btest/btest -A -d -j ${ZEEK_CI_BTEST_JOBS}

        - id: include-plugins-debian13
          file: ci/debian-13/Dockerfile
          run: |
            ZEEK_CI_CONFIGURE_FLAGS="--include-plugins=$GITHUB_WORKSPACE/testing/builtin-plugins/Files/protocol-plugin;$GITHUB_WORKSPACE/testing/builtin-plugins/Files/py-lib-plugin;$GITHUB_WORKSPACE/testing/builtin-plugins/Files/zeek-version-plugin;$GITHUB_WORKSPACE/testing/builtin-plugins/external/zeek-perf-support;$GITHUB_WORKSPACE/testing/builtin-plugins/external/zeek-more-hashes;$GITHUB_WORKSPACE/testing/builtin-plugins/external/zeek-cluster-backend-nats;$GITHUB_WORKSPACE/testing/builtin-plugins/external/zeek-kafka" ./ci/build.sh

            (cd $GITHUB_WORKSPACE/testing/builtin-plugins/external && git clone https://github.com/zeek/zeek-perf-support.git)
            (cd $GITHUB_WORKSPACE/testing/builtin-plugins/external && git clone https://github.com/zeek/zeek-more-hashes.git)
            (cd $GITHUB_WORKSPACE/testing/builtin-plugins/external && git clone https://github.com/zeek/zeek-cluster-backend-nats.git)
            (cd $GITHUB_WORKSPACE/testing/builtin-plugins/external && git clone https://github.com/SeisoLLC/zeek-kafka.git)

            (cd testing/builtin-plugins && ../../auxil/btest/btest -d -b -j ${ZEEK_CI_BTEST_JOBS})

            . $GITHUB_WORKSPACE/build/zeek-path-dev.sh
            set -ex
            # For now, just check if the external plugins are available.
            zeek -N Zeek::PerfSupport
            zeek -N Zeek::MoreHashes
            zeek -N Zeek::Cluster_Backend_NATS
            zeek -N Seiso::Kafka

    name: ${{ matrix.id }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        submodules: recursive
        persist-credentials: false

    - name: Cache Docker image
      uses: ScribeMD/docker-cache@0.5.0
      id: docker-cache
      with:
        key: docker-${{ matrix.id }}-${{ hashFiles(matrix.file) }}

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        file: ${{ matrix.file }}
        context: . # Reuse the current checkout instead of doing a full recursive clone again.
        tags: zeek-ci-${{ hashFiles(matrix.file) }}
        load: true
        push: false

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.workflow }}-${{ github.job }}-${{ matrix.id }}

    # FIXME(bbannier): add ./ci/init-external-repos.sh with caching, maybe in actual job below
    # - name: Clone external test suites
    #   run: |
    #     make -C testing/external/ init
    #     ./ci/init-external-repos.sh

    # FIXME(bbannier)
    # - name: Clone private test suite
    #   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Run script
      env:
          # We convert the environment variable dictionaries to JSON to work
          # around potential issues with shell quoting.
          _GHA_ENV: ${{ toJSON(env) }}
          _MATRIX_ENV: ${{ toJSON(matrix.env) }}
      run: |
        # Assembly environment variables for the script. We support both global
        # as well as job variables with the latter taking precedence. We also
        # allow either of them to be empty.
        python3 -c '
        import os, json

        gha = json.loads(os.environ.get("_GHA_ENV") or "{}") or {}
        mat = json.loads(os.environ.get("_MATRIX_ENV") or "{}") or {}
        merged = {**gha, **mat}
        with open("container.env", "w") as f:
            for k, v in merged.items():
                # Handle multiline flattening
                val = " ".join(str(v).splitlines())
                f.write(f"{k}={val}\n")
        '

        docker run --rm \
            --env-file container.env \
            -v ${{ github.workspace }}:${{ github.workspace }} \
            -v ${{ env.CCACHE_DIR }}:${{ env.CCACHE_DIR }} \
            -w ${{ github.workspace }} \
            zeek-ci-${{ hashFiles(matrix.file) }} \
            bash -c "set -e; ${{ matrix.run }}"

  windows:
    if: false
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        submodules: recursive
        persist-credentials: false

    - name: Cache Docker image
      uses: ScribeMD/docker-cache@0.5.0
      id: docker-cache
      with:
        key: docker-windows-${{ hashFiles('ci/windows/Dockerfile') }}

    # - name: Set up QEMU
    #   uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        file: ci/windows/Dockerfile
        context: . # Reuse the current checkout instead of doing a full recursive clone again.
        tags: zeek-ci-${{ hashFiles('ci/windows/Dockerfile') }}
        load: true
        push: false

    - name: Run
      uses: addnab/docker-run-action@v3
      with:
        image: zeek-ci-${{ hashFiles('ci/windows/Dockerfile') }}
        shell: powershell
        options: |
          -v ${{ github.workspace }}:${{ github.workspace }}
          -w ${{ github.workspace }}
        run: |
          set -e

          export GIT_CONFIG_PARAMETERS="'safe.directory=*'"

          echo "::group::Pre-build"
          ./ci/windows/prepare.cmd

          echo "::group::Build"
          ./ci/windows/build.cmd

          echo "::group::Test"
          ./ci/windows/test.cmd
